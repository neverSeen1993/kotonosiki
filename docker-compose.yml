services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "80:5173"      # Vite dev server (proxies /api to 3001)
      - "3001:3001"     # API server (direct access)
    volumes:
      - .:/app                          # mount source code live
      - /app/node_modules               # keep container's own node_modules
      - kotonosiki-data:/app/server/data
    environment:
      - NODE_ENV=development
      - PORT=3001
    restart: unless-stopped

volumes:
  kotonosiki-data:
